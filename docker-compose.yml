services:
  postgres:
    image: postgres:15-alpine
    container_name: city_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: ${DB_URL}
      REDIS_URL: ${REDIS_URL}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      KAFKA_LOG_TOPIC: ${KAFKA_LOG_TOPIC}
      CACHE_TTL: ${CACHE_TTL}
      CACHE_MAX_ITEMS: ${CACHE_MAX_ITEMS}
    command: ["alembic", "upgrade", "head"]
    restart: "no"

  redis:
    image: redis:alpine
    container_name: city_redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  kafka:
    image: apache/kafka:latest
    container_name: city_kafka
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      CLUSTER_ID: "5L6g3nShT-eMCtK--X86sw"
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:9094,CONTROLLER://0.0.0.0:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9094"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9094 --list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  kafka-init:
    image: apache/kafka:latest
    container_name: city_kafka_init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-lc"]
    command: >
      "/opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092
      --create --if-not-exists --topic ${KAFKA_LOG_TOPIC} --partitions 1 --replication-factor 1"
    restart: "no"

  api:
    build: .
    container_name: city_api
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    environment:
      #GUNICORN_WORKERS: 3
      DB_URL: ${DB_URL}
      REDIS_URL: ${REDIS_URL}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      KAFKA_LOG_TOPIC: ${KAFKA_LOG_TOPIC}
      CACHE_TTL: ${CACHE_TTL}
      CACHE_MAX_ITEMS: ${CACHE_MAX_ITEMS}

    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

  seeder:
    build:
      context: .
      dockerfile: Dockerfile.seeder
    container_name: city_seeder
    restart: "no"
    depends_on:
      api:
        condition: service_healthy

  # redisinsight:
  #   image: redis/redisinsight:latest
  #   container_name: city_redisinsight
  #   ports:
  #     - "5540:5540"
  #   environment:
  #     RI_REDIS_HOST: redis
  #     RI_REDIS_PORT: 6379
  #   volumes:
  #     - redisinsight_data:/data
  #   depends_on:
  #     redis:
  #       condition: service_healthy


  elasticsearch:
    image: elasticsearch:8.13.0
    container_name: city_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  kibana:
    image: kibana:8.13.0
    container_name: city_kibana
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    depends_on:
      elasticsearch:
        condition: service_healthy

  logstash:
    image: logstash:8.13.0
    container_name: city_logstash
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline  # کانفیگ pipeline
    environment:
      LS_JAVA_OPTS: "-Xms256m -Xmx256m"
    depends_on:
      elasticsearch:
        condition: service_healthy
      kafka:
        condition: service_healthy
volumes:
  postgres_data:
  redis_data:
  kafka_data:
  # redisinsight_data:
  elasticsearch_data:
